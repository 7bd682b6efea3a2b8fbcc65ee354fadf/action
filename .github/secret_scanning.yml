# LAB: Offensive secret_scanning.yml
# Attacker dengan write access ke repo bisa commit file ini untuk
# membungkam GitHub Secret Scanning di path tertentu.
# GitHub menghormati file ini tanpa notifikasi ke repo owner.

paths-ignore:
  # Sembunyikan action itu sendiri dari scanning
  - 'action.yaml'
  - 'action.yml'

  # Sembunyikan seluruh example directory (credential files)
  - 'example/**'

  # Sembunyikan workflow yang trigger action
  - '.github/workflows/**'

  # Pola umum yang sering dipakai attacker untuk hide payload
  - '**/*.min.js'
  - '**/vendor/**'
  - '**/dist/**'
  - '**/node_modules/**'
