rules:

  - name: "Google OAuth Client Secret (loose)"
    id: "custom.google.7"
    description: "Google OAuth Client Secret with relaxed length (built-in requires exactly 28 chars)"
    pattern: '\b(GOCSPX-[a-zA-Z0-9_-]{10,})\b'
    examples:
      - "GOOGLE_CLIENT_SECRET=GOCSPX-LabDemoGoogleOAuth2Secret2024X"
      - "client-secret: GOCSPX-abcdefghijklmnopqrstuvwxyz01"
    categories: [api, secret]

  - name: "JWT Secret (context-based)"
    id: "custom.jwt.1"
    description: "JWT signing secret detected via variable name — catches .env, YAML, JS, Python"
    pattern: '(?i)jwt[_.-]?secret[^A-Za-z0-9]{0,10}([a-zA-Z0-9+/=_-]{32,})'
    examples:
      - "JWT_SECRET=LabNodeJwtSup3rS3cr3tK3y2024XYZabcdefghijklmnopq"
      - "jwt_secret: LabRailsJwtSup3rS3cr3tK3y2024XYZabcdefgh"
      - "jwt.secret = LabSpringJwtSup3rS3cr3tK3y2024XYZabcdefghijklmnopq"
    categories: [api, secret]

  - name: "GitHub OAuth Client Secret"
    id: "custom.github.2"
    description: "GitHub OAuth app client secret — context-based, not the ghp_ PAT format"
    pattern: '(?i)github.{0,30}(?:client[_.-]?secret|oauth[_.-]?secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{35,50})'
    examples:
      - "GITHUB_CLIENT_SECRET=LabDemoGitHubOAuthClientSecret2024ABCDEF"
      - "github_client_secret: LabDemoGitHubOAuthClientSecret2024ABC"
    categories: [api, secret]
