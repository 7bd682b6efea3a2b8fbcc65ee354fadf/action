rules:

  - name: "Google OAuth Client Secret (loose)"
    id: "custom.google.7"
    description: "Google OAuth Client Secret with relaxed length (built-in requires exactly 28 chars)"
    pattern: '\b(GOCSPX-[a-zA-Z0-9_-]{10,})\b'
    examples:
      - "GOOGLE_CLIENT_SECRET=GOCSPX-LabDemoGoogleOAuth2Secret2024X"
      - "client-secret: GOCSPX-abcdefghijklmnopqrstuvwxyz01"
    categories: [api, secret]

  - name: "JWT Secret (context-based)"
    id: "custom.jwt.1"
    description: "JWT signing secret detected via variable name — catches .env, YAML, JS, Python"
    pattern: '(?i)jwt[_.-]?secret[^A-Za-z0-9]{0,10}([a-zA-Z0-9+/=_-]{32,})'
    examples:
      - "JWT_SECRET=LabNodeJwtSup3rS3cr3tK3y2024XYZabcdefghijklmnopq"
      - "jwt_secret: LabRailsJwtSup3rS3cr3tK3y2024XYZabcdefgh"
      - "jwt.secret = LabSpringJwtSup3rS3cr3tK3y2024XYZabcdefghijklmnopq"
    categories: [api, secret]

  - name: "GitHub OAuth Client Secret"
    id: "custom.github.2"
    description: "GitHub OAuth app client secret — context-based, not the ghp_ PAT format"
    pattern: '(?i)github[^A-Za-z0-9].{0,29}(?:client[_.-]?secret|oauth[_.-]?secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{35,50})'
    examples:
      - "GITHUB_CLIENT_SECRET=LabDemoGitHubOAuthClientSecret2024ABCDEF"
      - "github_client_secret: LabDemoGitHubOAuthClientSecret2024ABC"
    categories: [api, secret]

  - name: "Facebook / Meta App Secret"
    id: "custom.facebook.1"
    description: "Facebook / Meta application secret — context-based 32-char hex"
    pattern: '(?i)(?:facebook|meta|fb)[^A-Za-z0-9]{0,20}(?:app[_.-]?secret|client[_.-]?secret|secret)[^A-Za-z0-9]{0,10}([a-f0-9]{32})'
    examples:
      - "FACEBOOK_APP_SECRET=1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d"
      - "FB_APP_SECRET=abcdef1234567890abcdef1234567890"
    categories: [api, secret]

  - name: "Twitter / X Bearer Token"
    id: "custom.twitter.1"
    description: "Twitter/X API Bearer Token — requires context (env var assignment or Authorization header) to avoid FP in vendor JS"
    pattern: '(?i)(?:(?:twitter|x[_.-]?api|tw)[_.-]?\w{0,20}\s*[=:]\s*|Authorization\s*:\s*Bearer\s+)(AAAA[a-zA-Z0-9%/+=]{80,})\b'
    examples:
      - "TWITTER_BEARER_TOKEN=AAAAAAAAAAAAAAAAAAAALabDemoTwitterBearerTokenForAPIAccessTraining0123456789abcdefghijklmnop"
      - "Authorization: Bearer AAAAAAAAAAAAAAAAAAAALabDemoTwitterBearerTokenForAPIAccessTraining0123456789abcdef"
    categories: [api, secret]

  - name: "Twitter / X API Key and Secret"
    id: "custom.twitter.2"
    description: "Twitter/X API consumer key and secret — context-based detection"
    pattern: '(?i)twitter[^A-Za-z0-9]{0,20}(?:api[_.-]?secret|consumer[_.-]?secret|access[_.-]?secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{40,50})'
    examples:
      - "TWITTER_API_SECRET=LabDemoTwitterAPISecretKeyForOAuth1TrainingXYZ"
      - "twitter_consumer_secret: LabDemoTwitterConsumerSecretForOAuth2024"
    categories: [api, secret]

  - name: "Okta API Token"
    id: "custom.okta.1"
    description: "Okta API token — context-based detection (00 prefix, 42 chars)"
    pattern: '(?i)okta[^A-Za-z0-9]{0,20}(?:api[_.-]?token|token)[^A-Za-z0-9]{0,10}(00[a-zA-Z0-9_-]{40})'
    examples:
      - "OKTA_API_TOKEN=00LabDemoOktaAPITokenForIdentityTraining1234567"
      - "okta_token: 00LabDemoOktaTokenForAuthPlatform123456789"
    categories: [api, secret]

  - name: "Auth0 Client Secret"
    id: "custom.auth0.1"
    description: "Auth0 client secret — context-based detection"
    pattern: '(?i)auth0[^A-Za-z0-9]{0,20}(?:client[_.-]?secret|secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{40,80})'
    examples:
      - "AUTH0_CLIENT_SECRET=LabDemoAuth0ClientSecretForIdentityTraining123456"
      - "auth0_secret: LabDemoAuth0SecretKeyForOAuthFlow2024ABCDEF"
    categories: [api, secret]

  - name: "LinkedIn OAuth Client Secret"
    id: "custom.linkedin.1"
    description: "LinkedIn OAuth2 app client secret — context-based detection"
    pattern: '(?i)linkedin[^A-Za-z0-9]{0,20}(?:client[_.-]?secret|secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{16,32})'
    examples:
      - "LINKEDIN_CLIENT_SECRET=LabDemoLinkedInSecret2024"
      - "linkedin_secret: LabDemoLinkedInClientSecret01"
    categories: [api, secret]
