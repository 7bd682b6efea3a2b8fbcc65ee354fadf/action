rules:

  - name: "OpenAI API Key"
    id: "custom.openai.1"
    description: "OpenAI API key — classic sk- format and newer sk-proj- / sk-svcacct- formats"
    pattern: '\b(sk-(?:proj-|svcacct-)[a-zA-Z0-9_-]{80,}|sk-[a-zA-Z0-9]{48})\b'
    examples:
      - "OPENAI_API_KEY=sk-LabDemoOpenAIKeyForTrainingOnlyAbCdEfGhIjKlMnOpQ"
      - "openai.api_key = sk-proj-LabDemoOpenAIProjectKeyForTrainingABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456"
    categories: [api, secret]

  - name: "Hugging Face Token"
    id: "custom.huggingface.1"
    description: "Hugging Face access token or API key (hf_ prefix)"
    pattern: '\b(hf_[a-zA-Z0-9]{34,40})\b'
    examples:
      - "HUGGINGFACE_TOKEN=hf_LabDemoHuggingFaceTokenForTraining1234"
      - "HF_TOKEN=hf_LabDemoHFAccessTokenForMLPipeline123456"
    categories: [api, secret]

  - name: "Replicate API Token"
    id: "custom.replicate.1"
    description: "Replicate AI platform API token (r8_ prefix)"
    pattern: '\b(r8_[a-zA-Z0-9]{38,46})\b'
    examples:
      - "REPLICATE_API_TOKEN=r8_LabDemoReplicateTokenForAIInference123456789"
      - "replicate_token: r8_LabDemoReplicateAPITokenForTraining1234567"
    categories: [api, secret]

  - name: "Cohere API Key"
    id: "custom.cohere.1"
    description: "Cohere AI API key — context-based detection"
    pattern: '(?i)cohere[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key|token)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{38,45})'
    examples:
      - "COHERE_API_KEY=LabDemoCohereApiKeyForNLPTrainingABCDEFGHIJ"
      - "cohere_key: LabDemoCohereKeyForTextGenTraining1234567"
    categories: [api, secret]

  - name: "Mistral AI API Key"
    id: "custom.mistral.1"
    description: "Mistral AI API key — context-based detection"
    pattern: '(?i)mistral[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key|token)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{32,50})'
    examples:
      - "MISTRAL_API_KEY=LabDemoMistralApiKeyForLLMTraining12345678"
      - "mistral_key: LabDemoMistralKeyForAIInferenceTraining1234"
    categories: [api, secret]

  - name: "Anthropic API Key"
    id: "custom.anthropic.1"
    description: "Anthropic Claude API key (sk-ant- prefix)"
    pattern: '\b(sk-ant-(?:api03-)[a-zA-Z0-9_-]{93}AA)\b'
    examples:
      - "ANTHROPIC_API_KEY=sk-ant-api03-LabDemoAnthropicKeyForClaudeTrainingABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456AA"
    categories: [api, secret]

  - name: "Google AI / Gemini API Key"
    id: "custom.google-ai.1"
    description: "Google AI Studio / Gemini API key (AIza prefix)"
    pattern: '\b(AIza[a-zA-Z0-9_-]{35})\b'
    examples:
      - "GEMINI_API_KEY=AIzaLabDemoGoogleAIKeyForGeminiTraining123"
      - "GOOGLE_API_KEY=AIzaLabDemoGeminiAPIKeyForLLMPipeline1234"
    categories: [api, secret]

  - name: "AWS Bedrock / Claude via AWS"
    id: "custom.aws-bedrock.1"
    description: "AWS credentials commonly used to access Bedrock/Claude — context-based"
    pattern: '(?i)bedrock[^A-Za-z0-9]{0,30}(?:access[_.-]?key|secret|token)[^A-Za-z0-9]{0,10}([A-Za-z0-9/+]{20,50})'
    examples:
      - "BEDROCK_ACCESS_KEY=LabDemoBedrockAccessKeyForClaudeABCDEFGH"
    categories: [api, secret]

  - name: "Azure OpenAI API Key"
    id: "custom.azure-openai.1"
    description: "Azure OpenAI Service API key — context-based detection"
    pattern: '(?i)azure[^A-Za-z0-9]{0,20}openai[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key)[^A-Za-z0-9]{0,10}([a-fA-F0-9]{32})\b'
    examples:
      - "AZURE_OPENAI_API_KEY=LabDemoAzureOpenAIKey1234abcd5678efgh9012"
    categories: [api, secret]

  - name: "Groq API Key"
    id: "custom.groq.1"
    description: "Groq LPU inference API key (gsk_ prefix)"
    pattern: '\b(gsk_[a-zA-Z0-9]{52})\b'
    examples:
      - "GROQ_API_KEY=gsk_LabDemoGroqAPIKeyForLLMInferencePlatformTraining01234567890A"
    categories: [api, secret]

  - name: "xAI / Grok API Key"
    id: "custom.xai.1"
    description: "xAI (Grok) API key (xai- prefix)"
    pattern: '\b(xai-[a-zA-Z0-9]{52})\b'
    examples:
      - "XAI_API_KEY=xai-LabDemoXAIGrokAPIKeyForLLMPlatformTraining01234567890A"
    categories: [api, secret]

  - name: "Perplexity AI API Key"
    id: "custom.perplexity.1"
    description: "Perplexity AI API key (pplx- prefix)"
    pattern: '\b(pplx-[a-zA-Z0-9]{48})\b'
    examples:
      - "PERPLEXITY_API_KEY=pplx-LabDemoPerplexityAPIKeyForSearchAugmentedLLMPlatform"
    categories: [api, secret]

  - name: "ElevenLabs API Key"
    id: "custom.elevenlabs.1"
    description: "ElevenLabs text-to-speech API key — context-based detection"
    pattern: '(?i)eleven[_.-]?labs[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key|token)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{32,40})'
    examples:
      - "ELEVENLABS_API_KEY=LabDemoElevenLabsKeyForTTSVoiceGeneration2024"
      - "elevenlabs_key: LabDemoElevenLabsAPIKeyForAudioSynthesis01"
    categories: [api, secret]

  - name: "Together AI API Key"
    id: "custom.together-ai.1"
    description: "Together AI inference API key — context-based detection"
    pattern: '(?i)together[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{64})'
    examples:
      - "TOGETHER_API_KEY=LabDemoTogetherAIAPIKeyForOpenSourceLLMInferencePlatform12345678"
    categories: [api, secret]

  - name: "Stability AI API Key"
    id: "custom.stability-ai.1"
    description: "Stability AI (Stable Diffusion) API key — context-based sk- detection"
    pattern: '(?i)stability[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key)[^A-Za-z0-9]{0,10}(sk-[a-zA-Z0-9]{48,60})'
    examples:
      - "STABILITY_API_KEY=sk-LabDemoStabilityAIKeyForImageGenerationPlatform2024AB"
    categories: [api, secret]

  - name: "Pinecone API Key"
    id: "custom.pinecone.1"
    description: "Pinecone vector database API key — context-based detection"
    pattern: '(?i)pinecone[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{36,50})'
    examples:
      - "PINECONE_API_KEY=LabDemoPineconeAPIKeyForVectorDBTraining2024ABCD"
    categories: [api, secret]

  - name: "DeepSeek API Key"
    id: "custom.deepseek.1"
    description: "DeepSeek AI API key — context-based sk- detection"
    pattern: '(?i)deepseek[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key)[^A-Za-z0-9]{0,10}(sk-[a-zA-Z0-9]{48,60})'
    examples:
      - "DEEPSEEK_API_KEY=sk-LabDemoDeepSeekAPIKeyForLLMReasoningPlatform2024ABCDE"
    categories: [api, secret]
