rules:

  - name: "Ethereum / EVM Private Key"
    id: "custom.crypto.eth.1"
    description: "Ethereum or EVM-compatible wallet private key (0x + 64 hex chars)"
    pattern: '\b(0x[a-fA-F0-9]{64})\b'
    examples:
      - "PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      - "privateKey: 0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
    categories: [secret]

  - name: "Bitcoin WIF Private Key"
    id: "custom.crypto.btc.1"
    description: "Bitcoin Wallet Import Format (WIF) private key — requires explicit = or : assignment to avoid FP from base64 data"
    pattern: '(?i)(?:bitcoin|btc|wif)[_.-]?\w{0,20}\s*[=:]\s*([5KLc][1-9A-HJ-NP-Za-km-z]{50,51})\b'
    examples:
      - "BITCOIN_WIF=5HueCGU8rMjxECyDialwujzvTA42gnfWxrjg2t2xhPQDsKSfHLd"
      - "btc_private_key: KwDiBf89QgGbjEhKnhXJuH7LrciVrZi3qYjgd9M7rFU73sVHnoWn"
    categories: [secret]

  - name: "BIP39 Mnemonic Seed Phrase"
    id: "custom.mnemonic.1"
    description: "BIP39 wallet seed phrase (12 or 24 words) — detected via keyword context"
    pattern: '(?i)(?:mnemonic|seed[_.-]?phrase|recovery[_.-]?phrase)[^a-zA-Z]{0,20}([a-z]{3,8}(?:[ \t][a-z]{3,8}){11,23})'
    examples:
      - "MNEMONIC=abandon ability able about above absent absorb abstract absurd abuse access accident"
      - "seed_phrase: abandon amount liar amount expire adjust cage candy arch gather drum buyer"
    categories: [secret]

  - name: "Web3 RPC Provider Key"
    id: "custom.crypto.rpc.1"
    description: "Infura / Alchemy / QuickNode API key — Web3 RPC provider access credentials"
    pattern: '(?i)(?:infura|alchemy|quicknode)[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key|token|project[_.-]?id)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{32,50})'
    examples:
      - "INFURA_API_KEY=LabDemoInfuraProjectIdForWeb3Training1234567"
      - "ALCHEMY_API_KEY=LabDemoAlchemyKeyForBlockchainTraining12345"
      - "quicknode_api_key: LabDemoQuickNodeKeyForWeb3Testing123456"
    categories: [api, secret]

  - name: "Solana Wallet Private Key"
    id: "custom.solana.1"
    description: "Solana wallet private key — base58 encoded, 87-88 chars, context-based"
    pattern: '(?i)(?:solana|sol)[^A-Za-z0-9]{0,20}(?:private[_.-]?key|secret[_.-]?key|wallet)[^A-Za-z0-9]{0,10}([1-9A-HJ-NP-Za-km-z]{87,88})'
    examples:
      - "SOLANA_PRIVATE_KEY=5Jds3xQ2LabDemoSolanaPrivateKeyForWeb3TrainingABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopq"
    categories: [secret]

  - name: "Binance API Key and Secret"
    id: "custom.binance.1"
    description: "Binance exchange API key and secret — context-based detection"
    pattern: '(?i)binance[^A-Za-z0-9]{0,20}(?:api[_.-]?(?:key|secret)|secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{64})'
    examples:
      - "BINANCE_API_KEY=LabDemoBinanceAPIKeyForCryptoTradingPlatformTraining1234567890ABCDEFGH"
      - "binance_secret: LabDemoBinanceSecretKeyForCryptoExchangeAccess2024ABCDEFGHIJKLMNOP"
    categories: [api, secret]

  - name: "Coinbase / Coinbase Pro API Key"
    id: "custom.coinbase.1"
    description: "Coinbase or Coinbase Pro API key and secret — context-based detection"
    pattern: '(?i)coinbase[^A-Za-z0-9]{0,20}(?:api[_.-]?(?:key|secret)|secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9/+=_-]{32,88})'
    examples:
      - "COINBASE_API_SECRET=LabDemoCoinbaseAPISecretKeyForCryptoTrading2024ABCDEFGHIJKLMN"
    categories: [api, secret]

  - name: "Kraken API Private Key"
    id: "custom.kraken.1"
    description: "Kraken exchange API private key — context-based base64 detection"
    pattern: '(?i)kraken[^A-Za-z0-9]{0,20}(?:private[_.-]?key|api[_.-]?secret|secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9+/]{80,90}={0,2})'
    examples:
      - "KRAKEN_PRIVATE_KEY=LabDemoKrakenPrivateKeyForCryptoExchangeBase64EncodedABCDEFGHIJKLMNOPQRSTUVWXYZabcde=="
    categories: [api, secret]
