rules:

  - name: "MySQL / MariaDB URI Credentials"
    id: "custom.mysql.1"
    description: "MySQL or MariaDB connection URI with embedded password"
    pattern: '(?i)mysql(?:2)?://[a-zA-Z0-9._%-]+:([^@\t\n]{5,50})@'
    examples:
      - "DATABASE_URL=mysql://app_user:LabMySQLPassword2024@db-prod.internal:3306/myapp"
      - "DB_URL=mysql2://symfony_user:Symf0nyPr0dPass@db.internal:3306/corp"
    categories: [secret, fuzzy]

  - name: "MongoDB URI Credentials"
    id: "custom.mongodb.1"
    description: "MongoDB or MongoDB+SRV connection URI with embedded password"
    pattern: '(?i)mongodb(?:\+srv)?://[a-zA-Z0-9._%-]+:([^@\t\n]{5,50})@'
    examples:
      - "MONGODB_URI=mongodb://mongouser:LabMongoPass2024@mongo.internal:27017/mydb"
      - "MONGO_URL=mongodb+srv://admin:LabAtlasPassword2024@cluster0.abc.mongodb.net/prod"
    categories: [secret, fuzzy]

  - name: "Redis URI with Password"
    id: "custom.redis.1"
    description: "Redis connection URI with inline password (redis://:password@host)"
    pattern: '(?i)redis://:([^@\t\n]{5,80})@'
    examples:
      - "REDIS_URL=redis://:R3d!sCach3K3y2024@redis-prod.internal:6379/1"
      - "CELERY_BROKER_URL=redis://:R3d!sCach3K3y2024@redis-prod.internal:6379/2"
    categories: [secret, fuzzy]

  - name: "DB Password in Config / Array Syntax"
    id: "custom.db.password.1"
    description: "Database password in PHP array, Python dict, YAML, .env, or properties — requires DB-specific prefix to reduce FP"
    pattern: '(?i)(?:db|database|mysql|mariadb|postgres(?:ql)?|pg|redis|mongo(?:db)?|mssql|oracle)[_.\-]?pass(?:word|wd)?\s*[=:>]{1,3}\s*[''"`]?(?!\$|[A-Za-z_]\w*(?:\.|->|::|\())([^''"`\s,;$(]{8,80})'
    examples:
      - "DB_PASSWORD=Symf0nyPr0dPass2024!"
      - "database_password: LabDjangoProdDbPass2024XYZ"
      - "mysql_password = LabMySQL@Pr0d#2024"
      - "redis_password: R3d!sMg2K3y2024"
      - "postgres_pass=LabPgPr0dPass2024XYZ"
    categories: [secret, fuzzy]

  - name: "PostgreSQL URI Credentials"
    id: "custom.postgres.1"
    description: "PostgreSQL connection URI with embedded password"
    pattern: '(?i)postgres(?:ql)?://[a-zA-Z0-9._%-]+:([^@\t\n]{5,50})@'
    examples:
      - "DATABASE_URL=postgresql://app_user:LabPgPassword2024@db.internal:5432/myapp"
      - "PG_URL=postgres://admin:LabPostgresPass2024@prod-db.internal/corp"
    categories: [secret, fuzzy]

  - name: "Supabase Service Role / Anon Key"
    id: "custom.supabase.1"
    description: "Supabase service role key or anon key — context-based JWT detection"
    pattern: '(?i)supabase[^A-Za-z0-9]{0,30}(?:service[_.-]?role|anon|api)[^A-Za-z0-9]{0,10}(?:key|token)[^A-Za-z0-9]{0,10}(eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+)'
    examples:
      - "SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.LabDemoPayload.LabDemoSignature"
      - "supabase_anon_key: eyJhbGciOiJIUzI1NiJ9.LabDemoAnon.LabDemoSig"
    categories: [api, secret]

  - name: "Elasticsearch Credentials in URI"
    id: "custom.elastic.1"
    description: "Elasticsearch connection URI with embedded username and password"
    pattern: '(?i)(?:elastic(?:search)?|es)[^A-Za-z0-9]{0,20}(?:url|host|uri|dsn)[^A-Za-z0-9]{0,10}https?://[a-zA-Z0-9._%-]+:([^@\t\n]{5,50})@'
    examples:
      - "ELASTICSEARCH_URL=https://elastic:LabElasticPass2024@es.internal:9200"
      - "ES_URL=https://admin:LabESPassword2024@elasticsearch.internal:9243"
    categories: [secret, fuzzy]

  - name: "PlanetScale / Neon / Turso Database URL"
    id: "custom.sdb.1"
    description: "Serverless database URLs (PlanetScale, Neon, Turso) with embedded credentials"
    pattern: '(?i)(?:mysql|postgres|libsql)://[a-zA-Z0-9._%-]+:([a-zA-Z0-9_-]{20,100})@[a-zA-Z0-9.-]*(?:planetscale|psdb\.cloud|neon|turso)'
    examples:
      - "DATABASE_URL=mysql://labuser:pscale_pw_LabDemoPlanetScalePass2024ABC@aws.connect.psdb.cloud/mydb"
      - "DATABASE_URL=postgres://labuser:LabDemoNeonPassword2024@ep-lab-demo.us-east-1.aws.neon.tech/mydb"
    categories: [secret, fuzzy]

  - name: "MSSQL / SQL Server URI Credentials"
    id: "custom.mssql.1"
    description: "Microsoft SQL Server connection URI with embedded password"
    pattern: '(?i)(?:mssql|sqlserver|sqlsrv)://[a-zA-Z0-9._%-]+:([^@\t\n]{5,50})@'
    examples:
      - "DATABASE_URL=mssql://sa:LabMSSQLPassword2024@db.internal:1433/myapp"
      - "DB_URL=sqlserver://appuser:LabSQLServerPwd2024@mssql.internal:1433/mydb"
    categories: [secret, fuzzy]

  - name: "Oracle DB Password"
    id: "custom.oracle.1"
    description: "Oracle database password — context-based detection"
    pattern: '(?i)oracle[^A-Za-z0-9]{0,20}(?:password|pwd|pass(?:word)?)[^A-Za-z0-9]{0,10}([^@\s''"`,;]{8,50})'
    examples:
      - "ORACLE_PASSWORD=LabOracleDbPass2024XYZ"
      - "oracle_pwd: LabOracleProdPass2024ABCDE"
    categories: [secret, fuzzy]

  - name: "CouchDB URI Credentials"
    id: "custom.couchdb.1"
    description: "CouchDB connection URL with embedded username and password"
    pattern: '(?i)couch(?:db)?[^\n]{0,30}https?://[a-zA-Z0-9._%-]+:([^@\t\n]{5,50})@'
    examples:
      - "COUCHDB_URL=http://admin:LabCouchPass2024@couchdb.internal:5984/mydb"
      - "couch_url: https://couchuser:LabCouchDBPassword2024@couch.internal:6984"
    categories: [secret, fuzzy]

  - name: "Firebase / Google API Key"
    id: "custom.firebase.1"
    description: "Firebase web API key — AIza prefix, 39 chars total"
    pattern: '(?i)(?:firebase|firestore|google)[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key)[^A-Za-z0-9]{0,10}(AIza[a-zA-Z0-9_-]{35})'
    examples:
      - "FIREBASE_API_KEY=AIzaLabDemoFirebaseApiKeyForDev2024XYZW"
      - "firestore_api_key: AIzaLabDemoFirestoreApiKeyProject2024ABCD"
    categories: [api, secret]

  - name: "ClickHouse Credentials"
    id: "custom.clickhouse.1"
    description: "ClickHouse analytics database password or API key"
    pattern: '(?i)clickhouse[^A-Za-z0-9]{0,30}(?:password|api[_.-]?key|key|token)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{10,60})'
    examples:
      - "CLICKHOUSE_PASSWORD=LabClickHousePassword2024ABCDE"
      - "clickhouse_api_key: LabClickHouseApiKeyForAnalytics2024AB"
    categories: [secret, fuzzy]

  - name: "RabbitMQ AMQP URI Credentials"
    id: "custom.rabbitmq.1"
    description: "RabbitMQ AMQP or AMQPS connection URI with embedded password"
    pattern: '(?i)amqps?://[a-zA-Z0-9._%-]+:([^@\t\n]{5,50})@'
    examples:
      - "RABBITMQ_URL=amqp://rabbituser:LabRabbitMQPass2024@rabbitmq.internal:5672/vhost"
      - "CELERY_BROKER_URL=amqps://mquser:LabAMQPSPassword2024@mq.internal:5671/prod"
    categories: [secret, fuzzy]

  - name: "Cassandra Credentials"
    id: "custom.cassandra.1"
    description: "Apache Cassandra or DataStax Astra database credentials — context-based"
    pattern: '(?i)cassandra[^A-Za-z0-9]{0,20}(?:password|api[_.-]?key|token|secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{10,80})'
    examples:
      - "CASSANDRA_PASSWORD=LabCassandraDbPass2024ABCDE"
      - "cassandra_token: LabCassandraAstraTokenForDB2024ABCDEF"
    categories: [secret, fuzzy]
