      - "coinremitter_key: LabDemoCoinremitterMerchantKeyForCryptoInvoice24"
    categories: [api, secret]

  - name: "Spectrocoin Merchant Credentials"
    id: "custom.spectrocoin.1"
    description: "Spectrocoin crypto payment merchant API key or secret"
    pattern: '(?i)spectrocoin[^A-Za-z0-9]{0,20}(?:api[_.-]?(?:key|secret)|merchant[_.-]?id|secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{20,80})'
    examples:
