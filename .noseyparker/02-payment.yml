  - name: "BTCPay Server API Key"
    id: "custom.btcpay.1"
    description: "BTCPay Server self-hosted Bitcoin payment API key"
    pattern: '(?i)btcpay[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key|token|auth[_.-]?token)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{30,80})'
    examples:
