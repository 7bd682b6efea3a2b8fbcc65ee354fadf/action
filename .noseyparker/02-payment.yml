    pattern: '(?i)coingate[^A-Za-z0-9]{0,20}(?:api[_.-]?token|token|api[_.-]?key|key)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{20,60})'
    examples:
      - "COINGATE_API_TOKEN=LabDemoCoinGateApiTokenForCryptoPayment2024"
