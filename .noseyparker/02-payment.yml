  - name: "Crypto.com Pay API Key"
    id: "custom.ccpay.1"
    description: "Crypto.com payment gateway API key and secret"
    pattern: '(?i)crypto[_.-]?com[^A-Za-z0-9]{0,20}(?:pay[^A-Za-z0-9]{0,10})?(?:api[_.-]?(?:key|secret)|secret[_.-]?key)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{20,80})'
    examples:
