  # ── Traditional / enterprise payment gateways ──────────────────────────────

  - name: "Authorize.Net API Key"
    id: "custom.authnet.1"
    description: "Authorize.Net transaction key and API login ID — US payment processor"
    pattern: '(?i)authorize[^A-Za-z]{0,3}net[^A-Za-z0-9]{0,20}(?:transaction[_.-]?key|api[_.-]?(?:login[_.-]?id|key)|secret)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{10,40})'
    examples:
      - "AUTHORIZE_NET_TRANSACTION_KEY=LabDemoAuthorizeNetTransactKey1234"
      - "authorizenet_secret: LabDemoAuthNetSecretForPayment2024AB"
    categories: [api, secret]

  - name: "2Checkout / Verifone API Key"
    id: "custom.2checkout.1"
    description: "2Checkout (Verifone) payment gateway API secret key"
    pattern: '(?i)(?:two[_.-]?checkout|twocheckout|2checkout|2co)[^A-Za-z0-9]{0,20}(?:secret|private[_.-]?key|api[_.-]?key)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{20,60})'
    examples:
      - "TWOCHECKOUT_SECRET=LabDemo2CheckoutSecretWordForPayment2024ABCDE"
      - "2checkout_api_key: LabDemo2CheckoutApiKeyForPaymentGateway2024AB"
    categories: [api, secret]

  - name: "Checkout.com API Key"
    id: "custom.checkoutcom.1"
    description: "Checkout.com payment gateway API secret key"
    pattern: '(?i)checkoutcom[^A-Za-z0-9]{0,20}(?:api[_.-]?(?:key|secret)|secret[_.-]?key)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{30,80})'
    examples:
      - "CHECKOUTCOM_API_SECRET=LabDemoCheckoutComApiSecretForPayment2024ABCDE"
      - "checkoutcom_secret_key: LabDemoCheckoutComSecretKeyForPayGateway2024AB"
    categories: [api, secret]

