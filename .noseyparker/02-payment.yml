  - name: "OpenNode API Key"
    id: "custom.opennode.1"
    description: "OpenNode Bitcoin Lightning payment gateway API key"
    pattern: '(?i)opennode[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key|token)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{20,60})'
    examples:
