rules:

  - name: "Midtrans API Key"
    id: "custom.midtrans.1"
    description: "Midtrans server/client key — Indonesian payment gateway (SB-Mid-* prefix)"
    pattern: '\b((?:SB-Mid-server|SB-Mid-client|Mid-server|Mid-client)-[a-zA-Z0-9_-]{10,})\b'
    examples:
      - "MIDTRANS_SERVER_KEY=SB-Mid-server-LabDemoMidtransServerKey2024"
      - "MIDTRANS_CLIENT_KEY=SB-Mid-client-LabDemoMidtransClientKey24"
      - "server_key: Mid-server-xxxxxLabDemoKeyxxxxxxxxxx"
    categories: [api, secret]

  - name: "Stripe Webhook Secret"
    id: "custom.stripe.3"
    description: "Stripe webhook signing secret (whsec_ prefix)"
    pattern: '\b(whsec_[a-zA-Z0-9]{24,56})\b'
    examples:
      - "STRIPE_WEBHOOK_SECRET=whsec_LabDemoWebhookSecret1234ABCD"
      - "webhook_secret: whsec_abcdefghijklmnopqrstuvwxyz123456"
    categories: [api, secret]

  - name: "Xendit API Key"
    id: "custom.xendit.1"
    description: "Xendit payment gateway API key — Indonesian provider (xnd_ prefix)"
    pattern: '\b(xnd_(?:production|development)_[a-zA-Z0-9_-]{20,})\b'
    examples:
      - "XENDIT_SECRET_KEY=xnd_production_AbCdEfGhIjKlMnOpQrStUvWxYz1234"
      - "xendit_key = xnd_development_aBcDeFgHiJkLmNoPqRsTuVwXyZ5678"
    categories: [api, secret]

  - name: "PayPal Client Secret"
    id: "custom.paypal.1"
    description: "PayPal OAuth2 client secret — detected via variable name context"
    pattern: '(?i)paypal.{0,30}(?:client[_.-]?secret|secret)[^A-Za-z0-9]{0,10}([A-Za-z0-9_-]{20,80})'
    examples:
      - "PAYPAL_CLIENT_SECRET=EJv4xMHs9JLsXY8LabDemoPayPalSecretForLab2024"
      - "paypal_secret: AbCdEfGhIjKlMnOpQrStUvWxYz1234567890"
    categories: [api, fuzzy, secret]

  - name: "Stripe API Secret Key"
    id: "custom.stripe.secret-key"
    description: "Stripe live and test secret API keys (sk_live_ / sk_test_ prefix)"
    pattern: '\b(sk_(?:live|test)_[a-zA-Z0-9]{24,})\b'
    examples:
      - "STRIPE_SECRET_KEY=sk_live_LabDemoStripeSecretKeyForPayment1234"
      - "stripe_key: sk_test_LabDemoStripeTestKeyForDevelopment1"
    categories: [api, secret]

  - name: "Razorpay Key Secret"
    id: "custom.razorpay.1"
    description: "Razorpay API key and secret (rzp_ prefix or context-based)"
    pattern: '\b(rzp_(?:live|test)_[a-zA-Z0-9]{14})\b'
    examples:
      - "RAZORPAY_KEY_ID=rzp_live_LabDemoRazorpayKey"
      - "RAZORPAY_KEY_SECRET=rzp_test_LabDemoRazorpayTest"
    categories: [api, secret]

  - name: "Square API Key"
    id: "custom.square.1"
    description: "Square payment API access token (EAAAEl prefix or sandbox EAAA)"
    pattern: '\b(EAAAEl[a-zA-Z0-9_-]{60,})\b'
    examples:
      - "SQUARE_ACCESS_TOKEN=EAAAElLabDemoSquareAccessTokenForPaymentGateway123456789012345678901234567"
    categories: [api, secret]

  - name: "Braintree Access Token"
    id: "custom.braintree.1"
    description: "Braintree payment gateway access token (access_token$production$ prefix)"
    pattern: '\b(access_token\$(?:production|sandbox)\$[a-zA-Z0-9]{16,64})\b'
    examples:
      - "BRAINTREE_ACCESS_TOKEN=access_token$production$LabDemoBraintreeToken2024ABCDEF"
      - "braintree_token: access_token$sandbox$LabDemoBraintreeSandboxToken"
    categories: [api, secret]

  - name: "Adyen API Key"
    id: "custom.adyen.1"
    description: "Adyen payment platform API key — context-based detection"
    pattern: '(?i)adyen[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key)[^A-Za-z0-9]{0,10}([a-zA-Z0-9]{40,100})'
    examples:
      - "ADYEN_API_KEY=LabDemoAdyenApiKeyForPaymentProcessingABCDEFGHIJKLMN"
    categories: [api, secret]

  - name: "Doku API Key (Indonesian)"
    id: "custom.doku.1"
    description: "Doku payment gateway API key — Indonesian provider, context-based"
    pattern: '(?i)doku[^A-Za-z0-9]{0,20}(?:api[_.-]?key|key|secret|client[_.-]?id)[^A-Za-z0-9]{0,10}([a-zA-Z0-9_-]{20,60})'
    examples:
      - "DOKU_CLIENT_ID=LabDemoDokuClientIdForPayment2024ABCDEF"
      - "doku_api_key: LabDemoDokuApiKeyForGateway2024ABCDE"
    categories: [api, secret]
